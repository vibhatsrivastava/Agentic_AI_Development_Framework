name: Copilot Auto-Implementation

# Trigger when CODEOWNERS approve an issue for implementation
# Command: /implement-plan
on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  validate-and-trigger:
    name: Validate CODEOWNER and Trigger Implementation
    runs-on: ubuntu-latest
    
    # Only run on issue comments (not PR comments)
    if: github.event.issue.pull_request == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check if commenter is CODEOWNER
        id: check-codeowner
        run: |
          # Get the commenter's username
          COMMENTER="${{ github.event.comment.user.login }}"
          echo "Commenter: $COMMENTER"
          
          # Read CODEOWNERS file and extract usernames
          # Check both possible locations: .github/CODEOWNERS (recommended) and root CODEOWNERS
          if [ -f .github/CODEOWNERS ]; then
            CODEOWNERS_FILE=".github/CODEOWNERS"
          elif [ -f CODEOWNERS ]; then
            CODEOWNERS_FILE="CODEOWNERS"
          else
            echo "❌ CODEOWNERS file not found in .github/ or repository root"
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Using CODEOWNERS file: $CODEOWNERS_FILE"
          
          # Extract usernames from CODEOWNERS (matches @username pattern)
          CODEOWNERS=$(grep -oP '@\K[a-zA-Z0-9_-]+' "$CODEOWNERS_FILE" | sort -u)
          echo "Code owners: $CODEOWNERS"
          
          # Check if commenter is in the list
          if echo "$CODEOWNERS" | grep -q "^${COMMENTER}$"; then
            echo "✅ $COMMENTER is a CODEOWNER"
            echo "is_codeowner=true" >> $GITHUB_OUTPUT
          else
            echo "❌ $COMMENTER is NOT a CODEOWNER"
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for approval command
        id: check-command
        if: steps.check-codeowner.outputs.is_codeowner == 'true'
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          echo "Comment body: $COMMENT_BODY"
          
          # Check for /implement-plan command
          if echo "$COMMENT_BODY" | grep -qiE '^/implement-plan'; then
            echo "✅ Valid command found"
            echo "has_command=true" >> $GITHUB_OUTPUT
            
            # Extract optional parameters from comment
            # Format: /implement-plan branch=feature-x model=gpt-oss:20b
            BRANCH=$(echo "$COMMENT_BODY" | grep -oP 'branch=\K[^\s]+' || echo "")
            MODEL=$(echo "$COMMENT_BODY" | grep -oP 'model=\K[^\s]+' || echo "")
            
            # Set defaults if not provided
            BRANCH=${BRANCH:-"copilot/issue-${{ github.event.issue.number }}"}
            MODEL=${MODEL:-"gpt-oss:20b"}
            
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "model=$MODEL" >> $GITHUB_OUTPUT
            echo "Branch: $BRANCH"
            echo "Model: $MODEL"
          else
            echo "❌ No valid command found"
            echo "has_command=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Post validation failure comment
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'false' &&
          contains(github.event.comment.body, '/implement-plan')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let codeownersContent = '';
            
            // Check both possible CODEOWNERS locations
            if (fs.existsSync('.github/CODEOWNERS')) {
              codeownersContent = fs.readFileSync('.github/CODEOWNERS', 'utf8');
            } else if (fs.existsSync('CODEOWNERS')) {
              codeownersContent = fs.readFileSync('CODEOWNERS', 'utf8');
            }
            
            const codeowners = codeownersContent
              .split('\n')
              .filter(line => line.includes('@') && !line.trim().startsWith('#'))
              .map(line => line.trim())
              .join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Authorization Failed**
              
              @${{ github.event.comment.user.login }}, you are not authorized to trigger implementation.
              
              Only CODEOWNERS can use the \`/implement-plan\` command.
              
              **Current CODEOWNERS:**
              ${codeowners}`
            });
      
      - name: Collect issue context
        id: collect-context
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch issue details
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Fetch all comments on the issue
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Build context for Copilot
            const issueContext = {
              title: issue.data.title,
              body: issue.data.body,
              number: issue.data.number,
              labels: issue.data.labels.map(l => l.name),
              comments: comments.data.map(c => ({
                author: c.user.login,
                body: c.body,
                created_at: c.created_at
              }))
            };
            
            // Find the approval comment (last comment before triggering)
            const approvalComment = comments.data[comments.data.length - 1];
            
            // Save to file for next step
            const fs = require('fs');
            fs.writeFileSync('issue-context.json', JSON.stringify(issueContext, null, 2));
            
            return issueContext;
      
      - name: Add labels for Copilot implementation
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Add labels to track implementation status
            // These labels indicate the issue is ready for Copilot implementation
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['copilot-implementing', 'approved']
            }).catch(err => {
              console.log('Note: Could not add labels:', err.message);
            });
            
            // Note: GitHub Copilot Workspace cannot be assigned as a user
            // The issue remains unassigned until opened in Copilot Workspace
            console.log('Issue ready for GitHub Copilot Workspace implementation');
      
      - name: Post confirmation comment
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.check-command.outputs.branch }}';
            const model = '${{ steps.check-command.outputs.model }}';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Implementation Approved - Ready for GitHub Copilot Workspace**
              
              @${{ github.event.comment.user.login }} has approved this issue for implementation.
              
              **Configuration:**
              - 🌿 **Branch:** \`${branch}\`
              - 🤖 **Model:** \`${model}\`
              - 👤 **Approver:** @${{ github.event.comment.user.login }}
              - 🏷️ **Labels:** \`copilot-implementing\`, \`approved\`
              
              ## 🚀 How to Implement with GitHub Copilot
              
              **Option 1: GitHub Copilot Workspace (Recommended)**
              1. Click the **"Open in Copilot Workspace"** button on this issue (requires GitHub Copilot license)
              2. Copilot will automatically read all context and comments below
              3. Review and approve Copilot's implementation plan
              4. Copilot creates branch \`${branch}\` and opens a PR
              
              **Option 2: VS Code with GitHub Copilot**
              1. Open this repository in VS Code
              2. Use GitHub Copilot Chat: "Implement issue #${{ github.event.issue.number }}"
              3. Create branch \`${branch}\` and commit changes
              4. Push and create a PR
              
              **Option 3: Manual Implementation**
              1. Review the implementation context comment below
              2. Create branch \`${branch}\`
              3. Implement the solution
              4. Create a PR with your changes
              
              ---
              
              📋 *All issue context and comments have been collected below for Copilot analysis*`
            });
      
      - name: Trigger GitHub Copilot Workspace
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.check-command.outputs.branch }}
          MODEL_NAME: ${{ steps.check-command.outputs.model }}
        with:
          script: |
            // Read issue context
            const fs = require('fs');
            const issueContext = JSON.parse(fs.readFileSync('issue-context.json', 'utf8'));
            
            // Prepare the prompt for Copilot
            let prompt = `# Issue #${issueContext.number}: ${issueContext.title}\n\n`;
            prompt += `${issueContext.body}\n\n`;
            prompt += `## Comments and Feedback\n\n`;
            
            issueContext.comments.forEach((comment, idx) => {
              prompt += `### Comment ${idx + 1} by @${comment.author}\n`;
              prompt += `${comment.body}\n\n`;
            });
            
            prompt += `\n## Implementation Instructions\n\n`;
            prompt += `Please implement the solution described in this issue, taking into account:\n`;
            prompt += `1. All comments and feedback provided above\n`;
            prompt += `2. Any proposed changes or modifications suggested before approval\n`;
            prompt += `3. Follow the repository's coding standards and conventions\n`;
            prompt += `4. Create appropriate tests for your changes\n`;
            prompt += `5. Update documentation as needed\n\n`;
            prompt += `**Target Branch:** ${process.env.BRANCH_NAME}\n`;
            prompt += `**LLM Model:** ${process.env.MODEL_NAME}\n`;
            
            // Create a new issue comment with the full context for manual triggering
            // Note: Automatic Copilot Workspace triggering requires GitHub Copilot for Business
            // This creates a formatted issue comment that can be used to manually trigger Copilot
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Copilot Implementation Context
              
              <details>
              <summary>Click to view full implementation context</summary>
              
              \`\`\`
              ${prompt}
              \`\`\`
              
              </details>
              
              **To implement:**
              - Use GitHub Copilot Workspace on this issue
              - Or manually create branch \`${process.env.BRANCH_NAME}\` and implement
              - Reference this context when implementing
              
              ---
              *Auto-generated by CI/CD Pipeline*`
            });
            
            console.log('✅ Implementation context prepared and posted');
