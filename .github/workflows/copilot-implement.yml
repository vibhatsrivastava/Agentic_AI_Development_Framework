name: Copilot Auto-Implementation

# Automatically assigns issues to GitHub Copilot when CODEOWNERS approve
# Command: /implement-plan [branch=<branch-name>] [model=<model-name>]
# Copilot will automatically start working and create a PR
on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  validate-and-trigger:
    name: Validate CODEOWNER and Trigger Implementation
    runs-on: ubuntu-latest
    
    # Only run on issue comments (not PR comments)
    if: github.event.issue.pull_request == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check if commenter is CODEOWNER
        id: check-codeowner
        run: |
          # Get the commenter's username
          COMMENTER="${{ github.event.comment.user.login }}"
          echo "Commenter: $COMMENTER"
          
          # Read CODEOWNERS file and extract usernames
          # Check both possible locations: .github/CODEOWNERS (recommended) and root CODEOWNERS
          if [ -f .github/CODEOWNERS ]; then
            CODEOWNERS_FILE=".github/CODEOWNERS"
          elif [ -f CODEOWNERS ]; then
            CODEOWNERS_FILE="CODEOWNERS"
          else
            echo "❌ CODEOWNERS file not found in .github/ or repository root"
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Using CODEOWNERS file: $CODEOWNERS_FILE"
          
          # Extract usernames from CODEOWNERS (matches @username pattern)
          CODEOWNERS=$(grep -oP '@\K[a-zA-Z0-9_-]+' "$CODEOWNERS_FILE" | sort -u)
          echo "Code owners: $CODEOWNERS"
          
          # Check if commenter is in the list
          if echo "$CODEOWNERS" | grep -q "^${COMMENTER}$"; then
            echo "✅ $COMMENTER is a CODEOWNER"
            echo "is_codeowner=true" >> $GITHUB_OUTPUT
          else
            echo "❌ $COMMENTER is NOT a CODEOWNER"
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for approval command
        id: check-command
        if: steps.check-codeowner.outputs.is_codeowner == 'true'
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          echo "Comment body: $COMMENT_BODY"
          
          # Check for /implement-plan command
          if echo "$COMMENT_BODY" | grep -qiE '^/implement-plan'; then
            echo "✅ Valid command found"
            echo "has_command=true" >> $GITHUB_OUTPUT
            
            # Extract optional parameters from comment
            # Format: /implement-plan branch=feature-x model=gpt-oss:20b
            BRANCH=$(echo "$COMMENT_BODY" | grep -oP 'branch=\K[^\s]+' || echo "")
            MODEL=$(echo "$COMMENT_BODY" | grep -oP 'model=\K[^\s]+' || echo "")
            
            # Set defaults if not provided
            BRANCH=${BRANCH:-"copilot/issue-${{ github.event.issue.number }}"}
            MODEL=${MODEL:-"gpt-oss:20b"}
            
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "model=$MODEL" >> $GITHUB_OUTPUT
            echo "Branch: $BRANCH"
            echo "Model: $MODEL"
          else
            echo "❌ No valid command found"
            echo "has_command=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Post validation failure comment
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'false' &&
          contains(github.event.comment.body, '/implement-plan')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let codeownersContent = '';
            
            // Check both possible CODEOWNERS locations
            if (fs.existsSync('.github/CODEOWNERS')) {
              codeownersContent = fs.readFileSync('.github/CODEOWNERS', 'utf8');
            } else if (fs.existsSync('CODEOWNERS')) {
              codeownersContent = fs.readFileSync('CODEOWNERS', 'utf8');
            }
            
            const codeowners = codeownersContent
              .split('\n')
              .filter(line => line.includes('@') && !line.trim().startsWith('#'))
              .map(line => line.trim())
              .join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Authorization Failed**
              
              @${{ github.event.comment.user.login }}, you are not authorized to trigger implementation.
              
              Only CODEOWNERS can use the \`/implement-plan\` command.
              
              **Current CODEOWNERS:**
              ${codeowners}`
            });
      
      - name: Collect issue context
        id: collect-context
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch issue details
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Fetch all comments on the issue
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Build context for Copilot
            const issueContext = {
              title: issue.data.title,
              body: issue.data.body,
              number: issue.data.number,
              labels: issue.data.labels.map(l => l.name),
              comments: comments.data.map(c => ({
                author: c.user.login,
                body: c.body,
                created_at: c.created_at
              }))
            };
            
            // Find the approval comment (last comment before triggering)
            const approvalComment = comments.data[comments.data.length - 1];
            
            // Save to file for next step
            const fs = require('fs');
            fs.writeFileSync('issue-context.json', JSON.stringify(issueContext, null, 2));
            
            return issueContext;
      
      - name: Add labels for Copilot implementation
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Add labels to track implementation status
            // These labels indicate the issue is ready for Copilot implementation
            const labelsToAdd = [
              'copilot-implementing',
              'approved',
              'ready-for-copilot'
            ];
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd
            }).catch(err => {
              console.log('Note: Could not add labels:', err.message);
              console.log('Labels may need to be created in repository settings');
            });
            
            // Add metadata to help GitHub Copilot Workspace
            console.log('✅ Issue labeled for GitHub Copilot implementation');
            console.log(`📋 Labels added: ${labelsToAdd.join(', ')}`);
            console.log('🤖 Ready for GitHub Copilot Workspace');
            
            // Note: GitHub Copilot Workspace cannot be assigned as a user
            // The issue remains unassigned until opened in Copilot Workspace
            console.log('💡 Tip: Click "Open in Copilot Workspace" button to begin');
      
      - name: Assign Issue to GitHub Copilot
        id: assign-copilot
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.check-command.outputs.branch }}
          MODEL_NAME: ${{ steps.check-command.outputs.model }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const branch = process.env.BRANCH_NAME;
            const model = process.env.MODEL_NAME;
            const targetRepo = `${context.repo.owner}/${context.repo.repo}`;
            
            // Build custom instructions from repository conventions
            const customInstructions = `Follow repository conventions from .github/copilot-instructions.md:
            - Use common/ package for LLM initialization (get_llm(), get_chat_llm(), get_embeddings())
            - Follow LCEL pattern for chain composition (prompt | llm | parser)
            - Use LangGraph create_react_agent for new agents
            - Maintain 75% test coverage minimum
            - Mock all LLM calls in tests
            - Target branch: ${branch}`;
            
            try {
              console.log(`🤖 Assigning issue #${issueNumber} to Copilot...`);
              console.log(`📋 Configuration: branch=${branch}, model=${model}`);
              
              // Assign the issue to Copilot via REST API
              const response = await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: targetRepo,
                  base_branch: branch,
                  custom_instructions: customInstructions,
                  custom_agent: '',
                  model: model || ''
                },
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              });
              
              console.log('✅ Successfully assigned issue to Copilot');
              console.log(`📊 Response status: ${response.status}`);
              console.log(`👤 Assignees: ${response.data.assignees?.map(a => a.login).join(', ') || 'none'}`);
              
              // Set output for next steps
              core.setOutput('assigned', 'true');
              core.setOutput('copilot_assigned', 'true');
              
              return {
                success: true,
                assignees: response.data.assignees?.map(a => a.login) || [],
                message: 'Issue successfully assigned to Copilot'
              };
              
            } catch (error) {
              console.error('❌ Failed to assign issue to Copilot:', error.message);
              console.error('Error details:', error);
              
              // Set output indicating failure
              core.setOutput('assigned', 'false');
              core.setOutput('copilot_assigned', 'false');
              core.setOutput('error_message', error.message);
              
              // Post error comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⚠️ **Automatic Assignment Failed**
                
                Unable to automatically assign this issue to GitHub Copilot.
                
                **Error:** ${error.message}
                
                **Manual workaround:**
                1. Click the **"Open in Copilot Workspace"** button at the top of this issue
                2. Or manually assign this issue to \`@copilot-swe-agent\` in the assignees dropdown
                
                **Note:** Automatic assignment requires:
                - GitHub Copilot Pro, Business, or Enterprise subscription
                - Copilot cloud agent enabled for this repository
                - Proper API permissions
                
                ---
                *If this error persists, check repository Copilot settings or contact your GitHub admin*`
              });
              
              return {
                success: false,
                error: error.message,
                message: 'Failed to assign issue to Copilot'
              };
            }
      
      - name: Post success notification
        if: |
          steps.check-codeowner.outputs.is_codeowner == 'true' &&
          steps.check-command.outputs.has_command == 'true' &&
          steps.assign-copilot.outputs.copilot_assigned == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.check-command.outputs.branch }}';
            const model = '${{ steps.check-command.outputs.model }}';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 **Copilot is now working on this issue!**
              
              GitHub Copilot cloud agent has been automatically assigned and is starting work.
              
              **What happens next:**
              1. 🔧 Copilot will analyze the issue and all comments
              2. 🌿 Create a new branch: \`${branch}\`
              3. 💻 Implement the solution following repository conventions
              4. 🧪 Generate comprehensive tests (>=75% coverage)
              5. 📝 Update documentation as needed
              6. 🔀 Open a pull request automatically
              7. 👀 Request your review when complete
              
              **Track progress:**
              - Watch for commits on branch \`${branch}\`
              - Monitor the [Agents panel](https://github.com/copilot/agents)
              - Check [session logs](https://github.com/copilot/agents) for real-time updates
              
              **Configuration:**
              - Model: \`${model}\`
              - Following conventions from \`.github/copilot-instructions.md\`
              
              ---
              
              💡 *You'll receive a notification when the PR is ready for review*`
            });
