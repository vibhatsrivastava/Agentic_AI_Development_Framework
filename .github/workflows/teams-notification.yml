name: Teams Notification
on:
  pull_request:
    types: [opened, closed]
jobs:
  notify-opened:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send Teams Adaptive Card (PR Opened)
        uses: peter-evans/teams-notification@v1
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: "Pull Request Created"
          message: |
            **${{ github.event.pull_request.title }}** by **${{ github.event.pull_request.user.login }}**
            [View PR](${{ github.event.pull_request.html_url }})
          adaptive-card: |
            {
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "size": "Large",
                  "weight": "Bolder",
                  "text": "${{ github.event.pull_request.title }}"
                },
                {
                  "type": "TextBlock",
                  "text": "Opened by ${{ github.event.pull_request.user.login }}",
                  "isSubtle": true
                },
                {
                  "type": "FactSet",
                  "facts": [
                    {"title": "Repository", "value": "${{ github.repository }}"},
                    {"title": "Branch", "value": "${{ github.event.pull_request.head.ref }}"}
                  ]
                }
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "View PR",
                  "url": "${{ github.event.pull_request.html_url }}"
                }
              ]
            }

  notify-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send Teams Adaptive Card (PR Merged)
        uses: peter-evans/teams-notification@v1
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: "Pull Request Merged"
          message: |
            **${{ github.event.pull_request.title }}** by **${{ github.event.pull_request.user.login }}**
            [View PR](${{ github.event.pull_request.html_url }})
          adaptive-card: |
            {
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "size": "Large",
                  "weight": "Bolder",
                  "text": "${{ github.event.pull_request.title }}"
                },
                {
                  "type": "TextBlock",
                  "text": "Merged by ${{ github.event.pull_request.merged_by.login }}",
                  "isSubtle": true
                },
                {
                  "type": "FactSet",
                  "facts": [
                    {"title": "Repository", "value": "${{ github.repository }}"},
                    {"title": "Branch", "value": "${{ github.event.pull_request.head.ref }}"}
                  ]
                }
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "View PR",
                  "url": "${{ github.event.pull_request.html_url }}"
                }
              ]
            }
